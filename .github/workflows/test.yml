name: Tests

on:
  push:
    branches:
      - '*'

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v6.0.0
        with:
          node-version-file: '.nvmrc'
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        env:
          NPM_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Ensure that build succeeds
        run: pnpm build

      - name: Run tests
        run: pnpm test